name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:mcp-stdio
      - run: npm pack --workspace @usermaven/wizard --dry-run
      - run: npm pack --workspace @usermaven/wizard-core --dry-run
      - run: npm pack --workspace @usermaven/wizard-schemas --dry-run
